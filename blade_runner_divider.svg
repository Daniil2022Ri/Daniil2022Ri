<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="100%" height="120">
  <defs>
    <!-- Фон -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0608"/>
      <stop offset="100%" stop-color="#14101a"/>
    </linearGradient>
    
    <!-- Неоновое свечение -->
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Туман -->
    <linearGradient id="fog" x1="0" y1="0.6" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0608" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0608" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="1200" height="120" fill="url(#bg)"/>
  
  <!-- Горизонтальные неоновые линии (город на горизонте) -->
  <g filter="url(#neon)" opacity="0.3">
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#00FF88" stroke-width="0.5"/>
    <line x1="0" y1="70" x2="1200" y2="70" stroke="#00aa55" stroke-width="0.3"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#006633" stroke-width="0.3"/>
  </g>
  
  <!-- Капли дождя -->
  <g opacity="0.25">
    <!-- Ряд 1 -->
    <line x1="50" y1="10" x2="48" y2="35" stroke="#00FF88" stroke-width="1"/>
    <line x1="150" y1="5" x2="148" y2="30" stroke="#00FF88" stroke-width="1"/>
    <line x1="280" y1="15" x2="278" y2="40" stroke="#00cc77" stroke-width="1"/>
    <line x1="420" y1="8" x2="418" y2="33" stroke="#00FF88" stroke-width="1"/>
    <line x1="560" y1="20" x2="558" y2="45" stroke="#00aa55" stroke-width="1"/>
    <line x1="700" y1="12" x2="698" y2="37" stroke="#00FF88" stroke-width="1"/>
    <line x1="850" y1="18" x2="848" y2="43" stroke="#00cc77" stroke-width="1"/>
    <line x1="980" y1="6" x2="978" y2="31" stroke="#00FF88" stroke-width="1"/>
    <line x1="1100" y1="22" x2="1098" y2="47" stroke="#00aa55" stroke-width="1"/>
    
    <!-- Ряд 2 (длиннее) -->
    <line x1="80" y1="30" x2="78" y2="65" stroke="#00FF88" stroke-width="1.2" opacity="0.6"/>
    <line x1="220" y1="25" x2="218" y2="60" stroke="#00cc77" stroke-width="1.2" opacity="0.5"/>
    <line x1="360" y1="35" x2="358" y2="70" stroke="#00FF88" stroke-width="1.2" opacity="0.6"/>
    <line x1="500" y1="28" x2="498" y2="63" stroke="#00aa55" stroke-width="1.2" opacity="0.4"/>
    <line x1="640" y1="40" x2="638" y2="75" stroke="#00FF88" stroke-width="1.2" opacity="0.6"/>
    <line x1="780" y1="32" x2="778" y2="67" stroke="#00cc77" stroke-width="1.2" opacity="0.5"/>
    <line x1="920" y1="38" x2="918" y2="73" stroke="#00FF88" stroke-width="1.2" opacity="0.6"/>
    <line x1="1060" y1="26" x2="1058" y2="61" stroke="#00aa55" stroke-width="1.2" opacity="0.4"/>
    
    <!-- Ряд 3 (короткие, быстрые) -->
    <line x1="120" y1="55" x2="119" y2="72" stroke="#00FF88" stroke-width="0.8" opacity="0.3"/>
    <line x1="310" y1="50" x2="309" y2="67" stroke="#00cc77" stroke-width="0.8" opacity="0.3"/>
    <line x1="480" y1="58" x2="479" y2="75" stroke="#00FF88" stroke-width="0.8" opacity="0.3"/>
    <line x1="670" y1="52" x2="669" y2="69" stroke="#00aa55" stroke-width="0.8" opacity="0.3"/>
    <line x1="860" y1="56" x2="859" y2="73" stroke="#00FF88" stroke-width="0.8" opacity="0.3"/>
    <line x1="1030" y1="54" x2="1029" y2="71" stroke="#00cc77" stroke-width="0.8" opacity="0.3"/>
    <line x1="1150" y1="60" x2="1149" y2="77" stroke="#00aa55" stroke-width="0.8" opacity="0.3"/>
  </g>
  
  <!-- Блики на земле (отражение) -->
  <g opacity="0.15">
    <ellipse cx="200" cy="105" rx="40" ry="2" fill="#00FF88"/>
    <ellipse cx="500" cy="108" rx="30" ry="1.5" fill="#00cc77"/>
    <ellipse cx="800" cy="102" rx="50" ry="2.5" fill="#00FF88"/>
    <ellipse cx="1050" cy="106" rx="35" ry="2" fill="#00aa55"/>
    <ellipse cx="350" cy="110" rx="25" ry="1.5" fill="#006633"/>
    <ellipse cx="650" cy="112" rx="20" ry="1" fill="#00FF88" opacity="0.5"/>
    <ellipse cx="950" cy="109" rx="28" ry="1.5" fill="#00cc77"/>
  </g>
  
  <!-- Туман снизу -->
  <rect x="0" y="80" width="1200" height="40" fill="url(#fog)"/>
  
  <!-- Центральный декоративный элемент -->
  <g filter="url(#neon)">
    <line x1="450" y1="60" x2="550" y2="60" stroke="#00FF88" stroke-width="0.5" opacity="0.6"/>
    <circle cx="600" cy="60" r="2" fill="#00FF88" opacity="0.8"/>
    <line x1="650" y1="60" x2="750" y2="60" stroke="#00FF88" stroke-width="0.5" opacity="0.6"/>
  </g>
</svg>